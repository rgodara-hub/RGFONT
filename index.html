    // ==== More robust krutiToUnicode ==== 
    Function krutiToUnicode(text) {
        If (!text || !text.trim()) return '';

        Var modified = text;

        // Replace all keys with corresponding unicode
        For (var idx = 0; idx < array_one_k2u.length; idx++) {
            Var search = array_one_k2u[idx];
            Var replace = array_two_k2u[idx];
            Var pattern = search.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            Var regex = new RegExp(pattern, 'g');
            Modified = modified.replace(regex, replace);
        }

        // Specific character fixes after mapping

        // ± (reph+anusvAr) → Zं
        Modified = modified.replace(/±/g, "Zं");

        // Æ → र्f
        Modified = modified.replace(/Æ/g, "र्f");

        // Move f (ि) before consonant in string (Regex version)
        // 'f.' -> '.ि' repeatedly 
        While (/f./.test(modified)) {
            Modified = modified.replace(/f(.)/g, '$1ि');
        }

        // Ç → fa, É → र्fa replacements
        Modified = modified.replace(/Ç/g, "fa");
        Modified = modified.replace(/É/g, "र्fa");

        // 'fa' followed by char → char + 'िं' (doing it with regex repeating)
        While (/fa./.test(modified)) {
            Modified = modified.replace(/fa(.)/g, '$1िं');
        }

        // Ê → ीZ
        Modified = modified.replace(/Ê/g, "ीZ");

        // Fix wrong 'ि्' sequence to '्' + char + 'ि'
        While (/ि्./.test(modified)) {
            Modified = modified.replace(/ि्(.)/g, '्$1ि');
        }

        // Handle 'Z' (ref) repositioning
        // This code moves 'Z' to before consonant group properly

        // list of Hindi matras used to identify
        Var matrasSet = "अआइईउऊएऐओऔािीुूृेैोौंःँॅ";

        Var posZ = modified.indexOf('Z');
        While (posZ > 0) {
            Var leftPos = posZ – 1;
            // Move left pointer past matras
            While (leftPos >= 0 && matrasSet.indexOf(modified.charAt(leftPos)) !== -1) {
                leftPos--;
            }
            // Move to start of consonant cluster
            Var clusterStart = leftPos;
            While (clusterStart >= 0 && modified.charAt(clusterStart) === '्') {
                clusterStart -= 2; // skip halant + previous consonant
            }
            Var baseStart = Math.max(clusterStart, 0);
            Var substringToMove = modified.substring(baseStart, posZ);
            Var replacement = 'र्' + substringToMove;
            Modified = modified.substring(0, baseStart) + replacement + modified.substring(posZ + 1);

            posZ = modified.indexOf('Z', baseStart + replacement.length);
        }

        // Fix nukta letters formed wrongly (mostly redundant but safe)
        Var nuktaPairs = [
            ['क़', 'क़'], ['ख़', 'ख़'], ['ग़', 'ग़'], ['ज़', 'ज़'], ['ड़', 'ड़'], ['ढ़', 'ढ़'], ['फ़', 'फ़'], ['ऩ', 'ऩ'], ['य़', 'य़'], ['ऱ', 'ऱ']
        ];
        nuktaPairs.forEach(function(pair) {
            modified = modified.replace(new RegExp(pair[0], 'g'), pair[1]);
        });

        Return modified;
    }

    // ==== More robust unicodeToKruti ====
    Function unicodeToKruti(text) {
        If (!text || !text.trim()) return '';

        Var modified = text;

        // Replace Nukta chars with Kruti Dev versions (normalize)
        Modified = modified.replace(/त्र्य/g, '«य');
        Modified = modified.replace(/श्र्य/g, 'Ü‍‍zय');
        Modified = modified.replace(/क़/g, 'क़');
        Modified = modified.replace(/ख़/g, 'ख़');
        Modified = modified.replace(/ग़/g, 'ग़');
        Modified = modified.replace(/ज़/g, 'ज़');
        Modified = modified.replace(/ड़/g, 'ड़');
        Modified = modified.replace(/ढ़/g, 'ढ़');
        Modified = modified.replace(/ऩ/g, 'ऩ');
        Modified = modified.replace(/फ़/g, 'फ़');
        Modified = modified.replace(/य़/g, 'य़');
        Modified = modified.replace(/ऱ/g, 'ऱ');

        // Move 'ि' to after consonant as 'f' in Kruti text
        // Use regex to swap positions for all occurrences of (.) + 'ि'
        // Convert consonant + ि → f + consonant (base + halant handled)
        // We also take care of conjunct consonants with ् before

        While(/(.)(्?)ि/.test(modified)) {
            Modified = modified.replace(/(.)(्?)ि/g, function(match, p1, p2) {
                Return 'f' + p1 + p2;
            });
        }

        // Convert 'र्' to 'Z' and move forward past matras
        Modified += '  '; // append guards to avoid overflow
        Var matras = "ािीोौं:ँॅ";
        Var pos_r = modified.indexOf("र्");
        While (pos_r >= 0) {
            Var lookahead = pos_r + 2;
            While (lookahead < modified.length && matras.indexOf(modified.charAt(lookahead)) !== -1) {
                Lookahead++;
            }
            // Also handle the halant and other conjuncts forward
            While (lookahead + 1 < modified.length && modified.charAt(lookahead + 1) === "्") {
                Lookahead += 2;
            }
            Var replaceStr = modified.substring(pos_r + 2, lookahead);
            Modified = modified.slice(0, pos_r) + replaceStr + "Z" + modified.slice(lookahead);
            Pos_r = modified.indexOf("र्");
        }
        Modified = modified.trim();

        // Array based replacements for Unicode → Kruti mapping
        For (var i = 0; i < array_one_u2k.length; i++) {
            Var search = array_one_u2k[i];
            Var replace = array_two_u2k[i];
            Var pattern = search.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            Var regex = new RegExp(pattern, 'g');
            Modified = modified.replace(regex, replace);
        }

        // Final replacement fixes for common sequences
        Modified = modified.replace(/Zksa/g, 'ksZa');
        Modified = modified.replace(/~ Z/g, 'Z~');
        Modified = modified.replace(/Zk/g, 'kZ');
        Modified = modified.replace(/Zh/g, 'Ê');

        Return modified;
    }

    Function detectFont(text) {
        If (!text || !text.trim()) return 'unknown';
        Var uniCount = (text.match(/[\u0900-\u097F]/g) || []).length;
        Return (uniCount > text.length * 0.2) ? 'unicode' : 'kruti';
    }

    Function convertHtmlKrutiToUnicode(html) {
        Return html.replace(/(<[^>]+>)|([^<]+)/g, (m, tag, txt) => {
            If (tag) return tag;
            If (!txt || /^\s*$/.test(txt)) return txt || '';
            If (detectFont(txt) === 'unicode') return txt;
            Return krutiToUnicode(txt);
        });
    }

    Function convertHtmlUnicodeToKruti(html) {
        Return html.replace(/(<[^>]+>)|([^<]+)/g, (m, tag, txt) => {
            If (tag) return tag;
            If (!txt || /^\s*$/.test(txt)) return txt || '';
            If (detectFont(txt) === 'kruti') return txt;
            Return unicodeToKruti(txt);
        });
    }

    Function buildTableKrutiToUnicode(rows) {
        Var html = '<table>';
        Rows.forEach((row, rIndex) => {
            Var cells = row.split('|').filter(c => c.trim() !== '');
            Var tag = rIndex === 0 ? 'th' : 'td';
            Html += '<tr>';
            Cells.forEach(cell => {
                Var ct = cell.trim();
                If (detectFont(ct) !== 'unicode') ct = krutiToUnicode(ct);
                Html += `<${tag}>${ct}</${tag}>`;
            });
            Html += '</tr>';
        });
        Html += '</table>';
        Return html;
    }

    Function processPlainTextKrutiToUnicode(raw) {
        Var lines = raw.split('\n'), out = [], i = 0;
        While (i < lines.length) {
            Var ln = lines[i];
            If (ln.indexOf('|') !== -1 && /\|.+\|/.test(ln.trim())) {
                Var tblRows = [];
                While (i < lines.length && lines[i].indexOf('|') !== -1) {
                    // Exclude separator lines (--- etc)
                    If (!/^[\s|\-:+]+$/.test(lines[i])) tblRows.push(lines[i]);
                    I++;
                }
                If (tblRows.length) {
                    Out.push(buildTableKrutiToUnicode(tblRows));
                }
                Continue;
            }
            Var font = detectFont(ln);
            If (font === 'unicode') {
                Out.push(ln);
            } else {
                Out.push(krutiToUnicode(ln));
            }
            I++;
        }
        Return out.join('<br>');
    }

        Var t = krutiEditor.innerText || '';
        krutiChars.textContent = t.length;
        krutiWords.textContent = t.trim() ? t.trim().split(/\s+/).length : 0;
    }

    Function updateMangalStats() {
        Var t = mangalEditor.innerText || '';

        mangalTables.textContent = mangalEditor.querySelectorAll('table').length;

    Function downloadBlob(blob, name) {
        Var a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = name;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        setTimeout(() => URL.revokeObjectURL(a.href), 2000);
    }

    Function runConversionKrutiToUnicode(rawText, extraHtml) {
        setStatus('कन्वर्ट हो रहा है...', 'warn');
        showLoading(true, 'कन्वर्ट हो रहा है...');
        setTimeout(() => {
            try {
                var result = '';
                if (extraHtml) {
                    var mainHtml = (detectFont(rawText) !== 'unicode') ?
                        processPlainTextKrutiToUnicode(rawText) :
                        rawText.replace(/\n/g, '<br>');
                    result = mainHtml + (extraHtml ? '<br>' + extraHtml : '');
                } else if (/<table|<tr|<td|<th/i.test(rawText)) {
                    Result = convertHtmlKrutiToUnicode(rawText);
                } else {
                    Result = processPlainTextKrutiToUnicode(rawText);
                }

                undoStackMangal.push(mangalEditor.innerHTML);
                if (undoStackMangal.length > 30) undoStackMangal.shift();

                mangalEditor.innerHTML = result;
                mangalEditor.style.fontFamily = "'Noto Sans Devanagari', Mangal, sans-serif";
                updateMangalStats();
                setStatus('कन्वर्ट पूरा ✓ (Kruti → Mangal)', 'ok');
                notify('✓ Mangal Unicode में परिवर्तित!', 'ok');
                showLoading(false);
            } catch(e) {
                Notify('त्रुटि: ' + e.message, 'err');
                setStatus('त्रुटि', 'warn');
                showLoading(false);
            }
        }, 50);
    }

                    Var out = [];
                    For (var i = 0; i < lines.length; i++) {

    Function readTextFile(file) {
        Return new Promise(function(res, rej) {
            Var reader = new FileReader();
            Reader.onerror = () => rej(new Error("Failed to read file"));
            Reader.onload = function(e) {
                Try {
                    Var buf = e.target.result;
                    Var bytes = new Uint8Array(buf);
                    Var decoderWin1252 = new TextDecoder('windows-1252', {fatal: false});
                    Var decoderUtf8 = new TextDecoder('utf-8', {fatal: false});
                    Var win = decoderWin1252.decode(bytes);
                    Var utf = decoderUtf8.decode(bytes);
                    Function score(s) {
                        Return (s.match(/[dkf\[qwhslmnprtbcgxoujHBVMNF;+><=~'"&$#]/g) || []).length;
                    }
                    Res((score(win) > score(utf) + 5) ? win : utf);
                } catch(e) {
                    // fallback to txt raw
                    Res(new TextDecoder().decode(bytes));
                }
            };
            Reader.readAsArrayBuffer(file);
        });
    }

    // Better getElementsByTagName without NS wildcards  
    Function getElementsByTagNameAllNS(doc, tagName) {
        Var elements = [];
        ['http://schemas.openxmlformats.org/wordprocessingml/2006/main',
         ''].forEach(ns => {
            Var found = ns ? doc.getElementsByTagNameNS(ns, tagName) : doc.getElementsByTagName(tagName);
            For (var i=0; i<found.length; i++) elements.push(found[i]);
        });
        Return elements;
    }

    Function readDocx(file) {
        Return JSZip.loadAsync(file).then(zip => {
            Var xf = zip.file('word/document.xml');
            If (!xf) throw new Error('document.xml नहीं मिला');
            Return xf.async('string');
        }).then(xml => {
            Var parser = new DOMParser();
            Var doc = parser.parseFromString(xml, 'application/xml');
            // Getting paragraphs without NS wildcard (fall back)
            Var paras = getElementsByTagNameAllNS(doc, 'p');
            Var lines = [];
            Paras.forEach ? paras.forEach(p => {
                Let pt = '';
                Var runs = getElementsByTagNameAllNS(p, 'r');
                Runs.forEach ? runs.forEach(r => {
                    Var texts = getElementsByTagNameAllNS(r, 't');
                    Texts.forEach ? texts.forEach(t => pt += t.textContent) : [];
                }) : [];
                If (pt.trim()) lines.push(pt);
            }) : [];

            Var tblHtml = '';
            Var tables = getElementsByTagNameAllNS(doc, 'tbl');
            Tables.forEach ? tables.forEach(tbl => {
                tblHtml += '<table>';
                var rows = getElementsByTagNameAllNS(tbl, 'tr');
                rows.forEach ? rows.forEach(tr => {
                    tblHtml += '<tr>';
                    var cells = getElementsByTagNameAllNS(tr, 'tc');
                    cells.forEach ? cells.forEach(tc => {
                        var ctext = '';
                        var cts = getElementsByTagNameAllNS(tc, 't');
                        cts.forEach ? cts.forEach(ct => ctext += ct.textContent) : [];
                        var tagCell = tr === tables[0].getElementsByTagName('tr')[0] ? 'th' : 'td';
                        var conv = (detectFont(ctext) !== 'unicode') ? krutiToUnicode(ctext) : ctext;
                        tblHtml += `<${tagCell}>${conv}</${tagCell}>`;
                    }) : [];
                    tblHtml += '</tr>';
                }) : [];
                tblHtml += '</table>';
            }) : [];
            Return { text: lines.join('\n'), tableHtml: tblHtml };
        });
    }

    Function handleFile(file) {
        showLoading(true, 'पढ़ा जा रहा है: ' + file.name);
        setStatus('फ़ाइल पढ़ रहे हैं...', 'warn');
        currentFileName = file.name.replace(/\.[^.]+$/, '');
        fileInfo.textContent = file.name;
        var promise = /\.docx?$/i.test(file.name) ?
            readDocx(file) :
            readTextFile(file).then(t => ({ text: t, tableHtml: '' }));
        promise.then(res => {
            var raw = res.text || '';
            var extra = res.tableHtml || '';
            krutiEditor.innerHTML = raw.replace(/\n/g, '<br>');
            updateKrutiStats();
            runConversionKrutiToUnicode(raw, extra);
        }).catch(err => {
            showLoading(false);
            notify('त्रुटि: ' + err.message, 'err');
            setStatus('फ़ाइल त्रुटि', 'warn');
        });
    }
