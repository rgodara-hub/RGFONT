<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, shrink-to-fit=no, viewport-fit=cover">
  <title>RG MANNIWALI | .docx/.doc कृतिदेव ➔ मंगल कन्वर्टर</title>
  <!-- Mammoth.js for .docx reading -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js">
  </script>
  <!-- html2canvas for screenshot & jsPDF for PDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js">
  </script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js">
  </script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(145deg, #e3f2fd 0%, #bbdefb 100%);
      font-family: 'Mangal', 'Nirmala UI', 'Arial Unicode MS', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 16px;
    }

    .card {
      max-width: 750px;
      width: 100%;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      background: #ffffffdd;
      border-radius: 36px;
      box-shadow: 0 25px 50px -10px rgba(0, 100, 150, 0.3);
      padding: 24px 20px 26px;
      border: 1px solid rgba(120, 180, 240, 0.35);
    }

    .brand-header {
      text-align: center;
      margin-bottom: 8px;
    }

    .brand-header .logo-text {
      font-size: 2.6rem;
      font-weight: 850;
      background: linear-gradient(135deg, #0b4f6c, #2c7da0);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 1.4px;
      text-shadow: 0 4px 10px rgba(173, 216, 250, 0.7);
      line-height: 1.2;
    }

    .brand-header .logo-text .rg {
      font-size: 3.2rem;
      color: #0b4f6c;
      -webkit-text-fill-color: #0b4f6c;
      font-style: italic;
      font-weight: 900;
    }

    .subhead {
      text-align: center;
      color: #1e5a7a;
      margin-bottom: 20px;
      font-size: 1.05rem;
      font-weight: 500;
      border-bottom: 2px dashed #9ac7e7;
      padding-bottom: 14px;
      letter-spacing: 0.3px;
    }

    .file-upload-area {
      background: #edf6ff;
      border: 3px dashed #6da9d6;
      border-radius: 30px;
      padding: 22px 16px;
      text-align: center;
      margin-bottom: 22px;
      transition: 0.3s;
      cursor: pointer;
      background: #f4faff;
      position: relative;
    }

    .file-upload-area:hover {
      background: #def0ff;
      border-color: #3b8bc0;
      transform: scale(1.01);
    }

    .file-upload-area input[type="file"] {
      display: none;
    }

    .file-label {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      font-weight: 700;
      color: #054a67;
      font-size: 1.3rem;
      flex-wrap: wrap;
    }

    .file-label .icon-upload {
      font-size: 2.8rem;
      background: #bddff5;
      border-radius: 50%;
      padding: 12px;
      box-shadow: 0 8px 16px #a3cde9;
    }

    .file-name-display {
      margin-top: 12px;
      font-size: 1rem;
      color: #1e4f6b;
      font-weight: 600;
      word-break: break-all;
      background: #d4ebfc;
      border-radius: 16px;
      padding: 6px 14px;
      display: inline-block;
    }

    .supported-txt {
      font-size: 0.8rem;
      color: #2d6b8a;
      margin-top: 6px;
    }

    textarea {
      width: 100%;
      padding: 16px;
      font-size: 1.1rem;
      font-family: 'Mangal', 'Nirmala UI', 'Arial Unicode MS', sans-serif;
      border: 2px solid #b3d9f7;
      border-radius: 26px;
      background: #f6fbff;
      resize: vertical;
      min-height: 170px;
      line-height: 1.6;
      color: #022b3f;
      outline: none;
      transition: 0.25s;
      box-shadow: inset 0 4px 10px rgba(0, 120, 180, 0.08);
      margin-bottom: 18px;
    }

    textarea:focus {
      border-color: #3e92cc;
      box-shadow: 0 0 0 5px rgba(62, 146, 204, 0.2), inset 0 2px 10px rgba(0, 100, 160, 0.12);
    }

    .btn-group {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
      margin: 10px 0 20px;
    }

    button {
      background: #e1f0fa;
      border: none;
      padding: 14px 20px;
      border-radius: 40px;
      font-weight: 700;
      font-size: 1rem;
      color: #043b50;
      backdrop-filter: blur(8px);
      box-shadow: 0 6px 16px rgba(60, 140, 200, 0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: 0.2s;
      border: 1px solid #b6daf5;
      flex: 1 1 auto;
      min-width: 125px;
      cursor: pointer;
      letter-spacing: 0.4px;
    }

    button:hover {
      background: #c5e3ff;
      box-shadow: 0 10px 20px rgba(38, 132, 196, 0.4);
      transform: translateY(-3px);
    }

    button:active {
      transform: translateY(2px);
      box-shadow: 0 4px 10px rgba(0, 110, 180, 0.2);
    }

    .primary-btn {
      background: #78b9e6;
      color: white;
      border-color: #4f9ed4;
      font-weight: bold;
      box-shadow: 0 10px 18px #2c6c9e60;
    }

    .output-area {
      background: #f2f8ff;
      border-radius: 22px;
      padding: 16px;
      margin: 18px 0 10px;
      border: 2px solid #b6d9fc;
      word-wrap: break-word;
      white-space: pre-wrap;
      font-size: 1.1rem;
      line-height: 1.7;
      color: #022433;
      min-height: 150px;
      font-family: 'Mangal', 'Nirmala UI', sans-serif;
      box-shadow: inset 0 3px 14px #cde4f8;
    }

    .footer-icons {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 12px;
      color: #26648b;
      font-weight: 500;
      flex-wrap: wrap;
    }

    hr {
      border: 1px solid #bfddfa;
      margin: 16px 0 8px;
    }

    .loading-spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 3px solid #f3f9ff;
      border-top: 3px solid #0b4f6c;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 6px;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }
      100% {
        transform: rotate(360deg);
      }
    }

    @media (max-width: 480px) {
      button {
        padding: 12px 12px;
        font-size: 0.9rem;
        min-width: 95px;
      }
      .brand-header .logo-text {
        font-size: 2rem;
      }
      .file-label {
        font-size: 1.1rem;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand-header">
      <div class="logo-text">
        <span class="rg">RG</span> MANNIWALI
      </div>
    </div>
    <div class="subhead">📂 .docx / .doc फ़ाइल अपलोड करो ➔ ऑटो मंगल कन्वर्ट</div>

    <!-- फ़ाइल पिकर - .docx और .doc के लिए -->
    <div class="file-upload-area" id="fileUploadArea">
      <label for="fileInput" class="file-label">
        <span class="icon-upload">📁</span> <span>Word फ़ाइल चुनें (.docx / .doc)</span>
      </label>
      <input type="file" id="fileInput" accept=".docx,.doc,application/vnd.openxmlformats-officedocument.wordprocessingml.document,application/msword" onchange="handleWordFile(event)">
      <div class="file-name-display" id="fileNameDisplay"></div>
      <div class="supported-txt">✅ कृतिदेव में लिखी वर्ड फ़ाइलें सपोर्टेड हैं</div>
    </div>

    <!-- कीबोर्ड इनपुट टेक्स्ट एरिया (ऑल्टरनेट) -->
    <textarea id="legacy_text" placeholder="⌨️ या यहाँ कृतिदेव टेक्स्ट कीबोर्ड से टाइप/पेस्ट करें..."></textarea>

    <div class="btn-group">
      <button class="primary-btn" onclick="convert_to_unicode()">✨ कन्वर्ट करें</button>
      <button onclick="downloadPDF()">📄 PDF डाउनलोड</button>
    </div>

    <div style="font-weight:600; margin-left:6px; color:#115477;">📋 मंगल यूनिकोड आउटपुट:</div>
    <div id="unicode_output" class="output-area" contenteditable="false">
      <span style="color:#5c7f94;">यहाँ कन्वर्टेड टेक्स्ट दिखेगा...</span>
    </div>

    <div class="btn-group" style="margin-top:12px;">
      <button onclick="copyUnicodeText()">📋 कॉपी टेक्स्ट</button>
      <button onclick="saveAsWord()">📝 वर्ड में सेव करें</button>
      <button onclick="takeScreenshot()">📸 स्क्रीनशॉट लें</button>
    </div>
    <div class="footer-icons">
      <span>🌊 हल्का आसमानी</span>
      <span>📱 मोबाइल फ्रेंडली</span>
      <span>📂 .docx / .doc</span>
      <span>⌨️ कीबोर्ड</span>
    </div>
  </div>

  <script>
    // ---------- वर्ड फ़ाइल हैंडलिंग (.docx और .doc) ----------
    function handleWordFile(event) {
      const file = event.target.files[0];
      const displayDiv = document.getElementById("fileNameDisplay");
      if (!file) {
        displayDiv.innerHTML = "";
        return;
      }

      const fileName = file.name;
      const fileExt = fileName.split('.').pop().toLowerCase();
      displayDiv.innerHTML = "📄 " + fileName + ' <span class="loading-spinner" id="loadSpin"></span>';

      const reader = new FileReader();

      if (fileExt === 'docx') {
        // .docx फ़ाइल के लिए mammoth.js का उपयोग
        reader.onload = function(e) {
          const arrayBuffer = e.target.result;
          mammoth.extractRawText({ arrayBuffer: arrayBuffer })
            .then(function(result) {
              const text = result.value;
              document.getElementById("legacy_text").value = text;
              displayDiv.innerHTML = "✅ " + fileName + " - तैयार है!";
              // ऑटो कन्वर्ट (ऑप्शनल - अगर तुरंत कन्वर्ट चाहिए तो अनकमेंट करें)
              // convert_to_unicode();
            })
            .catch(function(err) {
              console.error(err);
              displayDiv.innerHTML = "❌ " + fileName + " - एरर!";
              alert("⚠️ .docx फ़ाइल पढ़ने में दिक्कत। कृपया टेक्स्ट को कॉपी-पेस्ट करें।");
            });
        };
        reader.readAsArrayBuffer(file);
      } else if (fileExt === 'doc') {
        // .doc फ़ाइलों के लिए - बाइनरी से टेक्स्ट निकालने का प्रयास
        reader.onload = function(e) {
          const buffer = e.target.result;
          let text = "";
          const uint8Array = new Uint8Array(buffer);
          // सिंपल टेक्स्ट एक्सट्रैक्शन (पुराने .doc फॉर्मेट के लिए)
          for (let i = 0; i < uint8Array.length; i++) {
            const byte = uint8Array[i];
            if (byte >= 32 && byte <= 126 || byte === 10 || byte === 13 || byte === 9 || byte >= 128) {
              text += String.fromCharCode(byte);
            }
          }
          // क्लीन अप
          text = text.replace(/[^\x20-\x7E\xA0-\xFF\u0900-\u097F\u2000-\u206F\n\r\t]/g, ' ')
            .replace(/\s+/g, ' ').trim();

          if (text.length < 10) {
            displayDiv.innerHTML = "⚠️ " + fileName + " - पुराना .doc फॉर्मेट, कृपया .docx में सेव करें या टेक्स्ट कॉपी करें।";
            alert(
              "⚠️ पुरानी .doc फ़ाइल से पूरा टेक्स्ट नहीं पढ़ा जा सका।\nकृपया फ़ाइल को .docx में सेव करके अपलोड करें या टेक्स्ट कॉपी-पेस्ट करें।");
            document.getElementById("legacy_text").value = text;
          } else {
            document.getElementById("legacy_text").value = text;
            displayDiv.innerHTML = "✅ " + fileName + " (टेक्स्ट निकाला गया)";
          }
        };
        reader.readAsArrayBuffer(file);
      } else {
        displayDiv.innerHTML = "❌ गलत फ़ाइल टाइप!";
        alert("कृपया .docx या .doc फ़ाइल ही चुनें।");
      }
    }

    // ---------- कृतिदेव से यूनिकोड (मंगल) रूपांतरण ----------
    function convert_to_unicode() {
      const array_one = [
        "ñ", "Q+Z", "sas", "aa", ")Z", "ZZ", "‘", "’", "“", "”",
        "å", "ƒ", "„", "…", "†", "‡", "ˆ", "‰", "Š", "‹",
        "¶+", "d+", "[+k", "[+", "x+", "T+", "t+", "M+", "<+", "Q+", ";+", "j+", "u+",
        "Ùk", "Ù", "ä", "–", "—", "é", "™", "=kk", "f=k",
        "à", "á", "â", "ã", "ºz", "º", "í", "{k", "{", "=", "«",
        "Nî", "Vî", "Bî", "Mî", "<î", "|", "K", "}",
        "J", "Vª", "Mª", "<ªª", "Nª", "Ø", "Ý", "nzZ", "æ", "ç", "Á", "xz", "#", ":",
        "v‚", "vks", "vkS", "vk", "v", "b±", "Ã", "bZ", "b", "m", "Å", ",s", ",", "_",
        "ô", "d", "Dk", "D", "[k", "[", "x", "Xk", "X", "Ä", "?k", "?", "³",
        "pkS", "p", "Pk", "P", "N", "t", "Tk", "T", ">", "÷", "¥",
        "ê", "ë", "V", "B", "ì", "ï", "M+", "<+", "M", "<", ".k", ".",
        "r", "Rk", "R", "Fk", "F", ")", "n", "/k", "èk", "/", "Ë", "è", "u", "Uk", "U",
        "i", "Ik", "I", "Q", "¶", "c", "Ck", "C", "Hk", "H", "e", "Ek", "E",
        ";", "¸", "j", "y", "Yk", "Y", "G", "o", "Ok", "O",
        "'k", "'", "\"k", "\"", "l", "Lk", "L", "g",
        "È", "z", "Ì", "Í", "Î", "Ï", "Ñ", "Ò", "Ó", "Ô", "Ö", "Ø", "Ù", "Ük", "Ü",
        "‚", "ks", "kS", "k", "h", "q", "w", "`", "s", "S",
        "a", "¡", "%", "W", "•", "·", "∙", "·", "~j", "~", "\\", "+", " ः",
        "^", "*", "Þ", "ß", "(", "¼", "½", "¿", "À", "¾", "A", "-", "&", "&", "Œ", "]", "~ ", "@"
      ];
      const array_two = [
        "॰", "QZ+", "sa", "a", "र्द्ध", "Z", "\"", "\"", "'", "'",
        "०", "१", "२", "३", "४", "५", "६", "७", "८", "९",
        "फ़्", "क़", "ख़", "ख़्", "ग़", "ज़्", "ज़", "ड़", "ढ़", "फ़", "य़", "ऱ", "ऩ",
        "त्त", "त्त्", "क्त", "दृ", "कृ", "न्न", "न्न्", "=k", "f=",
        "ह्न", "ह्य", "हृ", "ह्म", "ह्र", "ह्", "द्द", "क्ष", "क्ष्", "त्र", "त्र्",
        "छ्य", "ट्य", "ठ्य", "ड्य", "ढ्य", "द्य", "ज्ञ", "द्व",
        "श्र", "ट्र", "ड्र", "ढ्र", "छ्र", "क्र", "फ्र", "र्द्र", "द्र", "प्र", "प्र", "ग्र", "रु", "रू",
        "ऑ", "ओ", "औ", "आ", "अ", "ईं", "ई", "ई", "इ", "उ", "ऊ", "ऐ", "ए", "ऋ",
        "क्क", "क", "क", "क्", "ख", "ख्", "ग", "ग", "ग्", "घ", "घ", "घ्", "ङ",
        "चै", "च", "च", "च्", "छ", "ज", "ज", "ज्", "झ", "झ्", "ञ",
        "ट्ट", "ट्ठ", "ट", "ठ", "ड्ड", "ड्ढ", "ड़", "ढ़", "ड", "ढ", "ण", "ण्",
        "त", "त", "त्", "थ", "थ्", "द्ध", "द", "ध", "ध", "ध्", "ध्", "ध्", "न", "न", "न्",
        "प", "प", "प्", "फ", "फ्", "ब", "ब", "ब्", "भ", "भ्", "म", "म", "म्",
        "य", "य्", "र", "ल", "ल", "ल्", "ळ", "व", "व", "व्",
        "श", "श्", "ष", "ष्", "स", "स", "स्", "ह",
        "ीं", "्र", "द्द", "ट्ट", "ट्ठ", "ड्ड", "कृ", "भ", "्य", "ड्ढ", "झ्", "क्र", "त्त्", "श", "श्",
        "ॉ", "ो", "ौ", "ा", "ी", "ु", "ू", "ृ", "े", "ै",
        "ं", "ँ", "ः", "ॅ", "ऽ", "ऽ", "ऽ", "ऽ", "्र", "्", "?", "़", ":",
        "‘", "’", "“", "”", ";", "(", ")", "{", "}", "=", "।", ".", "-", "µ", "॰", ",", "् ", "/"
      ];

      let legacyText = document.getElementById("legacy_text").value;
      if (!legacyText.trim()) {
        document.getElementById("unicode_output").innerText = "⚠️ कृपया कृतिदेव टेक्स्ट डालें या वर्ड फ़ाइल अपलोड करें।";
        return;
      }

      let modified = legacyText;
      // स्पेशल ग्लिफ़ रिप्लेसमेंट
      for (let i = 0; i < array_one.length; i++) {
        modified = modified.split(array_one[i]).join(array_two[i]);
      }

      modified = modified.replace(/±/g, "Zं");
      modified = modified.replace(/Æ/g, "र्f");
      modified = modified.replace(/Ç/g, "fa");
      modified = modified.replace(/É/g, "र्fa");
      modified = modified.replace(/Ê/g, "ीZ");

      // f को ि में
      let pos = modified.indexOf("f");
      while (pos !== -1) {
        if (pos + 1 < modified.length) {
          let nextChar = modified.charAt(pos + 1);
          modified = modified.replace("f" + nextChar, nextChar + "ि");
        } else {
          modified = modified.replace("f", "ि");
        }
        pos = modified.indexOf("f", pos + 1);
      }

      // fa को िं में
      pos = modified.indexOf("fa");
      while (pos !== -1) {
        if (pos + 2 < modified.length) {
          let nextChar = modified.charAt(pos + 2);
          modified = modified.replace("fa" + nextChar, nextChar + "िं");
        } else {
          modified = modified.replace("fa", "िं");
        }
        pos = modified.indexOf("fa", pos + 2);
      }

      // गलत ि् को ठीक
      modified = modified.replace(/ि्(.)/g, "्$1ि");

      // Z (रेफ) सही जगह
      const matras = "अ आ इ ई उ ऊ ए ऐ ओ औ ा ि ी ु ू ृ े ै ो ौ ं : ँ ॅ";
      let posZ = modified.indexOf("Z");
      while (posZ > 0) {
        let prob = posZ - 1;
        while (prob >= 0 && matras.includes(modified.charAt(prob))) {
          prob--;
        }
        if (prob >= 0) {
          let part = modified.substring(prob, posZ);
          modified = modified.replace(part + "Z", "र्" + part);
        } else {
          modified = modified.replace("Z", "र्");
        }
        posZ = modified.indexOf("Z");
      }

      document.getElementById("unicode_output").innerText = modified;
    }

    // ---------- यूटिलिटी फंक्शन ----------
    function getConvertedText() {
      return document.getElementById("unicode_output").innerText;
    }

    function copyUnicodeText() {
      const text = getConvertedText();
      if (!text.trim() || text.includes("यहाँ कन्वर्टेड") || text.startsWith("⚠️")) {
        alert("पहले कन्वर्ट करें।");
        return;
      }
      navigator.clipboard.writeText(text).then(() => {
        alert("📋 यूनिकोड टेक्स्ट कॉपी हो गया!");
      }).catch(() => alert("कॉपी नहीं हुआ, मैन्युअली कॉपी करें।"));
    }

    function saveAsWord() {
      const text = getConvertedText();
      if (!text.trim() || text.includes("यहाँ कन्वर्टेड") || text.startsWith("⚠️")) {
        alert("पहले टेक्स्ट कन्वर्ट करें।");
        return;
      }
      const blob = new Blob([text], { type: "application/msword" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "mangal_unicode.doc";
      a.click();
      URL.revokeObjectURL(url);
    }

    function takeScreenshot() {
      const outputDiv = document.getElementById("unicode_output");
      if (!outputDiv.innerText.trim() || outputDiv.innerText.includes("यहाँ कन्वर्टेड") || outputDiv.innerText
        .startsWith("⚠️")) {
        alert("आउटपुट खाली है।");
        return;
      }
      html2canvas(outputDiv, {
        backgroundColor: "#f2f8ff",
        scale: 2
      }).then(canvas => {
        const imgData = canvas.toDataURL("image/png");
        const link = document.createElement("a");
        link.href = imgData;
        link.download = "mangal_screenshot.png";
        link.click();
      }).catch(() => alert("स्क्रीनशॉट नहीं ले पाए।"));
    }

    function downloadPDF() {
      const text = getConvertedText();
      if (!text.trim() || text.includes("यहाँ कन्वर्टेड") || text.startsWith("⚠️")) {
        alert("कृपया पहले कन्वर्ट करें।");
        return;
      }
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();
      doc.setFont("Helvetica");
      doc.setFontSize(12);
      const lines = doc.splitTextToSize(text, 180);
      doc.text(lines, 15, 20);
      doc.save("mangal_output.pdf");
    }
  </script>
</body>
</html>
